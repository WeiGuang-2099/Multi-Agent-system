name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff coverage

      - name: Lint with ruff
        run: |
          ruff check src tests eval
          ruff format --check src tests eval

      - name: Run unit tests with coverage
        env:
          ANTHROPIC_API_KEY: "fake-key-for-ci"
          OPENAI_API_KEY: "fake-key-for-ci"
          TAVILY_API_KEY: "fake-key-for-ci"
          POSTGRES_PASSWORD: "ci"
        run: |
          coverage run -m pytest tests/unit -v --maxfail=1
          coverage xml
          coverage report -m

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build main image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: multi-agent-research-assistant:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build sandbox image
        uses: docker/build-push-action@v6
        with:
          context: ./sandbox
          file: ./sandbox/Dockerfile.sandbox
          push: false
          tags: research-assistant-sandbox:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max