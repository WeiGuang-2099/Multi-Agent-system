services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-research_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile.sandbox
    image: research-assistant-sandbox:latest
    networks:
      - internal

  supervisor:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["--mode", "distributed", "--agent", "supervisor"]
    ports:
      - "${SUPERVISOR_PORT:-8001}:8001"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  search-agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["--mode", "distributed", "--agent", "search"]
    ports:
      - "${SEARCH_AGENT_PORT:-8002}:8002"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  code-agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["--mode", "distributed", "--agent", "code"]
    ports:
      - "${CODE_AGENT_PORT:-8003}:8003"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      sandbox:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2'
    networks:
      - internal

  writer-agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["--mode", "distributed", "--agent", "writer"]
    ports:
      - "${WRITER_AGENT_PORT:-8004}:8004"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["--mode", "ui"]
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    env_file: .env
    environment:
      SUPERVISOR_URL: http://supervisor:8001
    depends_on:
      - supervisor
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
